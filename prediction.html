<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="header">Student Placement Prediction System</h1>

    <div class="form-container">
        <form action="result.html" method="get">

            <input type="number" placeholder="Enter CGPA" required>
            <input type="number" placeholder="Enter Attendance %" required>
            <input type="number" placeholder="Enter No. of Internships" required>
            <input type="number" placeholder="Enter Technical Skill Rating (1-10)" required>
            <input type="number" placeholder="Enter Communication Skill Rating (1-10)" required>
            <input type="number" placeholder="Enter No. of Backlogs" required>

            <button type="submit" class="predict-btn">Predict</button>

        </form>
    </div>

</body>
</html>
